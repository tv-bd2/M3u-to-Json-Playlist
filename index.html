<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3U to IPTV JSON Converter</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --panel-bg: rgba(26, 29, 40, 0.75);
            --accent-color: #00f2fe;
            --accent-glow: #4facfe;
            --text-color: #c5c6c7;
            --border-color: rgba(0, 242, 254, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 950px;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6), 
                        0 0 40px rgba(0, 242, 254, 0.05);
        }

        h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: 1.5px;
            background: linear-gradient(135deg, var(--accent-color), var(--accent-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 14px;
            color: #4facfe;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"], textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 14px;
            color: #fff;
            font-size: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.25);
            background: rgba(0, 0, 0, 0.6);
        }

        textarea {
            height: 180px;
            resize: vertical;
            font-family: 'Fira Code', monospace;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            color: #555;
            font-size: 14px;
            font-weight: bold;
            position: relative;
        }

        .btn-container {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border: none;
            border-radius: 10px;
            padding: 16px;
            color: #0b0c10;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0, 242, 254, 0.2);
            text-transform: uppercase;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 242, 254, 0.4);
            filter: brightness(1.1);
        }

        .clear-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            box-shadow: none;
        }

        .clear-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: none;
        }

        .output-container {
            margin-top: 35px;
            display: none;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .status-badge {
            font-size: 13px;
            background: rgba(0, 242, 254, 0.1);
            color: var(--accent-color);
            padding: 6px 14px;
            border-radius: 30px;
            border: 1px solid rgba(0, 242, 254, 0.25);
            font-weight: 600;
        }

        .copy-btn {
            padding: 8px 20px;
            font-size: 13px;
            flex: none;
            border-radius: 6px;
        }

        pre {
            background: #050608;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 25px;
            max-height: 450px;
            overflow-y: auto;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 14px;
            color: #00f2fe;
            white-space: pre-wrap;
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>IPTV M3U to JSON Converter</h2>
    
    <!-- URL Input -->
    <div class="input-group">
        <label for="m3uUrl">M3U Playlist URL</label>
        <input type="text" id="m3uUrl" placeholder="https://example.com/playlist.m3u">
    </div>

    <div class="divider">OR</div>

    <!-- Text Paste Input -->
    <div class="input-group">
        <label for="m3uContent">Paste M3U Raw Text</label>
        <textarea id="m3uContent" placeholder="#EXTM3U&#10;#EXTINF:-1 tvg-logo=&quot;https://i.postimg.cc/nzbd170h/T-sports.png&quot;,T Sports&#10;https://tvsen7.aynaott.com/tsports-hd/index.m3u8"></textarea>
    </div>

    <!-- Controls -->
    <div class="btn-container">
        <button class="clear-btn" onclick="clearAll()">Clear</button>
        <button onclick="processM3U()">Generate Player JSON</button>
    </div>

    <!-- JSON Output Area -->
    <div class="output-container" id="outputArea">
        <div class="output-header">
            <span class="status-badge" id="channelCount">Channels: 0</span>
            <button class="copy-btn" onclick="copyJson()">Copy JSON</button>
        </div>
        <pre id="jsonOutput"></pre>
    </div>
</div>

<script>
    // আপনার প্লেয়ারের বেস গেটওয়ে লিঙ্ক
    const PLAYER_BASE_URL = "https://rs-player.netlify.app/jw-player?url=";

    async function processM3U() {
        const urlInput = document.getElementById('m3uUrl').value.trim();
        const textInput = document.getElementById('m3uContent').value.trim();
        let m3uRawData = "";

        if (urlInput) {
            try {
                const response = await fetch(urlInput);
                if (!response.ok) throw new Error('Network response failure');
                m3uRawData = await response.text();
            } catch (error) {
                alert("URL থেকে ফাইল লোড করা যায়নি (CORS সমস্যা হতে পারে)। টেক্সটটি কপি করে নিচের বক্সে পেস্ট করুন।");
                return;
            }
        } else if (textInput) {
            m3uRawData = textInput;
        } else {
            alert("অনুগ্রহ করে একটি M3U লিঙ্ক দিন অথবা টেক্সট বক্সে ডাটা পেস্ট করুন!");
            return;
        }

        const jsonResult = parseM3UToCustomFormat(m3uRawData);
        
        // রেজাল্ট UI-তে পাঠানো
        document.getElementById('jsonOutput').textContent = JSON.stringify(jsonResult, null, 2);
        document.getElementById('channelCount').textContent = `Total Channels: ${jsonResult.length}`;
        document.getElementById('outputArea').style.display = 'block';
    }

    function parseM3UToCustomFormat(content) {
        const lines = content.split('\n');
        const playlist = [];
        let currentItem = null;

        // লোগো ধরার জন্য Regex
        const regexLogo = /tvg-logo="([^"]+)"/;

        for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim();

            if (line.startsWith('#EXTINF:')) {
                currentItem = {};
                
                // লোগো এক্সট্রাক্ট করা
                const logoMatch = line.match(regexLogo);
                currentItem.image = logoMatch ? logoMatch[1] : "";
                
                // চ্যানেলের নাম এক্সট্রাক্ট করা (কমার পরের অংশ)
                const commaIndex = line.lastIndexOf(',');
                const displayName = commaIndex !== -1 ? line.substring(commaIndex + 1).trim() : "Unnamed Channel";
                currentItem.name = displayName;

            } else if (line && !line.startsWith('#')) {
                if (currentItem) {
                    // আপনার প্লেয়ারের প্রিফিক্স ইউআরএল যুক্ত করা হচ্ছে
                    currentItem.url = PLAYER_BASE_URL + line;
                    playlist.push(currentItem);
                    currentItem = null;
                }
            }
        }

        return playlist;
    }

    function copyJson() {
        const jsonText = document.getElementById('jsonOutput').textContent;
        navigator.clipboard.writeText(jsonText);
        alert("JSON copied to clipboard successfully!");
    }

    function clearAll() {
        document.getElementById('m3uUrl').value = '';
        document.getElementById('m3uContent').value = '';
        document.getElementById('outputArea').style.display = 'none';
    }
</script>

</body>
</html>
