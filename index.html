<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium IPTV Channel Parser</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: #1f2833;
            --accent-neon: #00ffcc;
            --accent-blue: #00a8ff;
            --text-main: #ffffff;
            --text-muted: #c5c6c7;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--accent-neon);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .input-box-wrapper {
            background-color: #151a21;
            padding: 25px;
            border-radius: 16px;
            border: 1px solid rgba(0, 255, 204, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 40px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--accent-blue);
        }

        input[type="text"] {
            width: 100%;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 10px;
            color: #fff;
            padding: 15px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.3s;
            margin-bottom: 10px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-neon);
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
        }

        textarea {
            width: 100%;
            height: 150px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 10px;
            color: #fff;
            padding: 15px;
            box-sizing: border-box;
            resize: vertical;
            font-family: 'Fira Code', monospace;
            font-size: 0.95rem;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-neon);
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
        }

        .divider {
            text-align: center;
            margin: 15px 0;
            color: var(--text-muted);
            font-weight: bold;
            position: relative;
        }

        .divider::before, .divider::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background-color: #30363d;
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }

        button {
            background: linear-gradient(135deg, var(--accent-neon), var(--accent-blue));
            border: none;
            color: #0b0c10;
            padding: 14px 30px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 204, 0.4);
        }

        .category-section {
            margin-bottom: 45px;
        }

        .category-header {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            border-left: 5px solid var(--accent-neon);
            padding-left: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(90deg, rgba(31, 40, 51, 0.6), transparent);
            padding-top: 8px;
            padding-bottom: 8px;
            border-radius: 0 8px 8px 0;
        }

        .category-count {
            font-size: 1rem;
            background-color: var(--accent-neon);
            color: #000;
            padding: 2px 12px;
            border-radius: 20px;
            font-weight: bold;
        }

        .channels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .channel-card {
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px 15px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .channel-card:hover {
            transform: translateY(-6px);
            border-color: var(--accent-neon);
            box-shadow: 0 10px 20px rgba(0, 255, 204, 0.15);
        }

        .channel-thumb {
            width: 75px;
            height: 75px;
            object-fit: contain;
            background-color: #0b0c10;
            border-radius: 50%;
            border: 2px solid #30363d;
            padding: 5px;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }

        .channel-card:hover .channel-thumb {
            border-color: var(--accent-neon);
        }

        .channel-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-main);
            word-break: break-word;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        @media (max-width: 600px) {
            body { padding: 10px; }
            header h1 { font-size: 1.8rem; }
            .channels-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
            .channel-thumb { width: 60px; height: 60px; }
            .channel-title { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Smart M3U Sorter</h1>
        <p>Automatic Category & Duplicate Filtering Based on Channel Names</p>
    </header>

    <div class="input-box-wrapper">
        <div class="input-group">
            <label for="m3uUrl">Option 1: Paste M3U Playlist URL / Link</label>
            <input type="text" id="m3uUrl" placeholder="https://example.com/playlist.m3u">
        </div>
        
        <div class="divider">OR</div>

        <div class="input-group">
            <label for="m3uRawData">Option 2: Paste Raw M3U Text Data</label>
            <textarea id="m3uRawData" placeholder="#EXTM3U&#10;#EXTINF:-1 tvg-logo='https://example.com/logo.png', T Sports HD&#10;http://example.com/stream.m3u8"></textarea>
        </div>

        <button onclick="loadAndProcessIPTV()">Filter and Load Channels</button>
    </div>

    <!-- Output sections will render here -->
    <div id="iptvOutput"></div>
</div>

<script>
async function loadAndProcessIPTV() {
    const m3uUrl = document.getElementById('m3uUrl').value.trim();
    const rawData = document.getElementById('m3uRawData').value.trim();
    let playlistContent = "";

    // 1. Determine Input Type (Link or Text)
    if (m3uUrl) {
        try {
            const response = await fetch(m3uUrl);
            if (!response.ok) throw new Error('Network response was not ok');
            playlistContent = await response.text();
        } catch (error) {
            alert('Failed to fetch M3U link. Make sure the URL is correct and CORS is enabled.');
            console.error(error);
            return;
        }
    } else if (rawData) {
        playlistContent = rawData;
    } else {
        alert('Please provide either an M3U Link or paste Raw M3U Data!');
        return;
    }

    const lines = playlistContent.split('\n');
    const parsedList = [];
    let tempChannel = null;

    // 2. M3U Parsing Line-by-Line
    for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();

        if (line.startsWith('#EXTINF:')) {
            tempChannel = {};
            
            // Extract Logo
            const logoMatch = line.match(/tvg-logo="([^"]+)"/) || line.match(/tvg-logo='([^']+)'/);
            tempChannel.logo = logoMatch ? logoMatch[1] : '';

            // Extract Name (after the last comma)
            const commaPos = line.lastIndexOf(',');
            tempChannel.name = commaPos !== -1 ? line.substring(commaPos + 1).trim() : 'Unknown Channel';
        } 
        else if (line.startsWith('http://') || line.startsWith('https://')) {
            if (tempChannel) {
                tempChannel.url = line;
                parsedList.push(tempChannel);
                tempChannel = null;
            }
        }
    }

    // 3. Initialize Category Buckets
    const categories = {
        sports: [],
        bangla: [],
        indian: [],
        music: [],
        others: []
    };

    const trackedNames = new Set();

    // 4. Filtering Logic based purely on Channel Name keywords
    parsedList.forEach(channel => {
        const cleanedName = channel.name.replace(/\s+/g, ' ').trim();
        const lowerName = cleanedName.toLowerCase();

        // Duplicate removal
        if (!lowerName || trackedNames.has(lowerName)) return;
        trackedNames.add(lowerName);

        // A. Sports Channels
        if (
            lowerName.includes('sports') || lowerName.includes('sport') || lowerName.includes('t sports') || 
            lowerName.includes('gazi tv') || lowerName.includes('gtv') || lowerName.includes('star sports') || 
            lowerName.includes('sony ten') || lowerName.includes('willow') || lowerName.includes('cricket') || 
            lowerName.includes('football') || lowerName.includes('ten 1') || lowerName.includes('ten 2') || 
            lowerName.includes('ten 3') || lowerName.includes('sony liv') || lowerName.includes('wwe')
        ) {
            categories.sports.push(channel);
        } 
        // B. Bangladeshi Channels
        else if (
            lowerName.includes('somoy') || lowerName.includes('jamuna') || lowerName.includes('independent') || 
            lowerName.includes('channel i') || lowerName.includes('atn') || lowerName.includes('ntv') || 
            lowerName.includes('rtv') || lowerName.includes('ekattor') || lowerName.includes('deepto') || 
            lowerName.includes('bangla') || lowerName.includes('bttv') || lowerName.includes('nagorik') || 
            lowerName.includes('duronto') || lowerName.includes('news24') || lowerName.includes('desh tv') ||
            lowerName.includes('boishakhi') || lowerName.includes('bwtv') || lowerName.includes('maasranga')
        ) {
            categories.bangla.push(channel);
        } 
        // C. Indian Channels
        else if (
            lowerName.includes('star plus') || lowerName.includes('sony tv') || lowerName.includes('colors') || 
            lowerName.includes('zee tv') || lowerName.includes('star gold') || lowerName.includes('sony max') || 
            lowerName.includes('zee cinema') || lowerName.includes('sab tv') || lowerName.includes('star utsav') ||
            lowerName.includes('sony pal') || lowerName.includes('bindass') || lowerName.includes('colors rishtey')
        ) {
            categories.indian.push(channel);
        } 
        // D. Music Channels
        else if (
            lowerName.includes('music') || lowerName.includes('musiq') || lowerName.includes('mtv') || 
            lowerName.includes('9xm') || lowerName.includes('zoom') || lowerName.includes('b4u music') || 
            lowerName.includes('sangeet') || lowerName.includes('v h1')
        ) {
            categories.music.push(channel);
        } 
        // E. Other Channels
        else {
            categories.others.push(channel);
        }
    });

    // 5. Render Output UI (Sequence: Sports -> Bangla -> Indian -> Music -> Others)
    const outputDiv = document.getElementById('iptvOutput');
    outputDiv.innerHTML = ''; 

    buildCategoryHTML('Sports Channels', categories.sports, outputDiv);
    buildCategoryHTML('Bangladeshi Channels', categories.bangla, outputDiv);
    buildCategoryHTML('Indian Channels', categories.indian, outputDiv);
    buildCategoryHTML('Music Channels', categories.music, outputDiv);
    buildCategoryHTML('Other Channels', categories.others, outputDiv);
}

function buildCategoryHTML(title, channelArray, targetContainer) {
    if (channelArray.length === 0) return; 

    let sectionHTML = `
        <div class="category-section">
            <div class="category-header">
                <span>${title}</span>
                <span class="category-count">${channelArray.length}</span>
            </div>
            <div class="channels-grid">
    `;

    channelArray.forEach(channel => {
        const logoUrl = channel.logo ? channel.logo : 'https://via.placeholder.com/75/1f2833/00ffcc?text=TV';
        sectionHTML += `
            <div class="channel-card" onclick="alert('Stream URL: ${channel.url}')">
                <img class="channel-thumb" src="${logoUrl}" onerror="this.src='https://via.placeholder.com/75/1f2833/00ffcc?text=TV'" alt="logo">
                <div class="channel-title">${channel.name}</div>
            </div>
        `;
    });

    sectionHTML += `</div></div>`;
    targetContainer.innerHTML += sectionHTML;
}
</script>

</body>
</html>
